[pytest]
# Discover tests under tests/ and use the project root for imports.
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Required so QApplication + pyqtgraph work headlessly.
qt_api = pyside6

# Show short, readable output in the terminal.
addopts =
    -ra
    --strict-markers
    -p no:cacheprovider

filterwarnings =
    ignore::DeprecationWarning
